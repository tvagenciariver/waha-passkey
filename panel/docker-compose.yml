version: '3.8'

services:
  passkey-panel:
    image: nginx:alpine
    container_name: waha_passkey_panel
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Mapeia a pasta atual (onde está o index.html, css e js) para o Nginx
      - ./:/usr/share/nginx/html:ro

# === INSTRUÇÕES PARA PORTAINER ===
# Se você for usar Traefik no Portainer para ter um domínio online (ex: painel.whatscorporativo.com),
# comente a seção "ports:" acima, e adicione as labels do Traefik abaixo:
#
#    deploy:
#      labels:
#        - traefik.enable=true
#        - traefik.http.routers.passkey-panel.rule=Host(`painel.whatscorporativo.com`)
#        - traefik.http.routers.passkey-panel.entrypoints=websecure
#        - traefik.http.routers.passkey-panel.tls.certresolver=letsencryptresolver
#        - traefik.http.services.passkey-panel.loadbalancer.server.port=80
#
# E lembre-se de conectar este serviço à mesma rede externa do Traefik (ex: MegaNet).
