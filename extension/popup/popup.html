<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAHA Passkey Bridge</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="M8 11h8"/>
          <path d="M12 15V7"/>
        </svg>
        <h1>WAHA Passkey</h1>
      </div>
      <button id="settingsBtn" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <div class="card status-card">
      <div class="status-row" style="margin-bottom: 8px;">
        <span>Extension ID:</span>
        <div style="display: flex; align-items: center; gap: 6px;">
          <code id="extIdDisplay" style="font-size: 11px; background: rgba(255,255,255,0.1); padding: 3px 6px; border-radius: 4px; user-select: all;">...</code>
          <button id="copyIdBtn" title="Copy to clipboard" style="background:none; border:none; color:#25D366; cursor:pointer; padding:2px; display:flex;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </button>
        </div>
      </div>
      <div class="status-row">
        <span>WAHA API:</span>
        <div class="status-badge" id="wahaStatus">
          <span class="dot"></span>
          <span class="text">Checking...</span>
        </div>
      </div>
      <div class="status-row">
        <span>Bridge Active:</span>
        <label class="switch">
          <input type="checkbox" id="bridgeToggle" checked>
          <span class="slider round"></span>
        </label>
      </div>
    </div>

    <div class="section">
      <h3>Active WhatsApp Tabs</h3>
      <div class="tabs-list" id="tabsList">
        <div class="empty-state">No WhatsApp Web tabs open.</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <h3>Event Log</h3>
        <button id="clearLogBtn" class="btn-icon" title="Clear Log">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
      <div class="log-container" id="eventLog">
        <!-- Logs will appear here -->
      </div>
    </div>

    <div class="actions">
      <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
      <button id="openWaBtn" class="btn btn-primary">Open WhatsApp Web</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
